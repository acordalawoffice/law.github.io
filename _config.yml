title: "Atty. Rodel P. Acorda Law Office"
description: "Labor Law & Compliance | Philippine Labor, Maritime, and Migrant Worker Law"
url: "https://acordalawoffice.github.io"
baseurl: "/law.github.io"

# Default social preview image used when an article doesn't set its own.
default_image: "/assets/images/site-preview.jpg"

# Where new articles live and how their URLs look.
# Example: 2026-07-19-two-notice-rule.md -> /insights/two-notice-rule/
collections:
  posts:
    output: true

permalink: /insights/:title/

markdown: kramdown
kramdown:
  parse_block_html: true

plugins:
  - jekyll-feed

# These get applied automatically to every file in _posts,
# so you never need to type "layout: article" yourself.
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "article"
